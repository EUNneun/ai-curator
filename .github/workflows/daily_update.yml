name: Daily AI Video Curation

on:
  schedule:
    - cron: '0 22 * * *'  # 매일 오전 7시 KST (UTC 22:00)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  curate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # curated_videos.json 이력 보존

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install google-api-python-client anthropic

      - name: STEP 1 — 채널 영상 수집
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python .claude/skills/youtube-collector/scripts/fetch_channel_videos.py
        continue-on-error: true

      - name: STEP 1 — 키워드 영상 검색
        env:
          YOUTUBE_API_KEY_2: ${{ secrets.YOUTUBE_API_KEY_2 }}
        run: python .claude/skills/youtube-collector/scripts/search_keyword_videos.py

      - name: STEP 2 — 중복 제거
        run: python .claude/skills/youtube-collector/scripts/dedup_filter.py

      - name: STEP 3 — 적합성 판단 (video-curator)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Anthropic API 키 없으면 DUMMY_MODE=true 유지 (모든 영상 include 처리)
          # API 키 등록 후 아래 값을 'false'로 변경하세요
          DUMMY_MODE: 'true'
        run: python .claude/skills/video-curator/scripts/run_curator.py

      - name: STEP 4 — 피드백 반영 (조건부)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .claude/skills/feedback-learner/scripts/run_feedback_learner.py
        continue-on-error: true

      - name: STEP 5 — 사이트 생성
        run: python .claude/skills/site-builder/scripts/build_site.py

      - name: Commit output files
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase --autostash origin main
          git add output/curated_videos.json \
                  .claude/skills/video-curator/references/curation_criteria.json \
                  output/site/feedback.json || true
          git diff --cached --quiet || git commit -m "chore: daily curation update $(date -u '+%Y-%m-%d')"
          git push origin HEAD

      - name: STEP 6 — GitHub Pages 배포
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash .claude/skills/site-builder/scripts/deploy.sh

      - name: 실패 시 GitHub Issue 생성
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[자동] 큐레이션 실패 - ${new Date().toISOString().slice(0,10)}`,
              body: `워크플로우 실행 실패\n\n실행 URL: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'automation']
            });
